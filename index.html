<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YouTube Looper (One Deck)</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css">
<script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.js"></script>
  <style>
    body { font-family: system-ui, Arial; margin: 16px; }
    .row { display:flex; gap:12px; flex-wrap: wrap; align-items: center; margin: 10px 0; }
    #playerWrap {
  width: 560px;          /* fixed width (simple) */
  height: 315px;         /* fixed height */
  background: #000;
}

#player iframe {
  width: 100% !important;
  height: 100% !important;
  display: block;
}
    input[type="text"] { width: 360px; }
    input.small { width: 90px; }
    button { padding: 6px 10px; }
  </style>
</head>
<body>
  <h1>YouTube Looper (One Deck)</h1>

  <div class="row">
    <input id="vid" type="text" placeholder="Paste YouTube URL or Video ID" />
    <button id="load">Load</button>
  </div>

  <div class="row">
    <button id="play">Play</button>
    <button id="pause">Pause</button>
    <button id="setA">Set A</button>
    <button id="setB">Set B</button>
  </div>

  <div class="row">
    <label>A <input id="A" class="small" type="number" step="0.1" value="0"></label>
    <label>B <input id="B" class="small" type="number" step="0.1" value="10"></label>
    <label>Vol <input id="vol" type="range" min="0" max="100" value="100"></label>
    <label><input id="mute" type="checkbox"> Mute</label>
  </div>
  
<div class="row">
  <label>
    Speed
    <select id="speed">
	<option value="0.25">0.25x</option>
      <option value="0.5">0.5x</option>
      <option value="0.75">0.75x</option>
      <option value="1" selected>1x</option>
      <option value="1.25">1.25x</option>
      <option value="1.5">1.5x</option>
      <option value="2">2x</option>
    </select>
  </label>
</div>
<div class="row" style="max-width:560px;">
  <div id="abSlider" style="width:560px; margin: 8px 0;"></div>
</div>

<div class="row">
  <div>Time: <span id="now">0.00</span>s / <span id="dur">0.00</span>s</div>
</div>
<div id="playerWrap">
  <div id="player"></div>
</div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let player = null;
    let loopTimer = null;

    function parseVideoId(input) {
      try {
        if (!input) return "";
        if (!input.includes("http")) return input.trim();
        const url = new URL(input);
        if (url.hostname.includes("youtu.be")) return url.pathname.slice(1);
        return url.searchParams.get("v") || "";
      } catch {
        return (input || "").trim();
      }
    }

    function startLoop() {
      if (loopTimer) return;
      const epsilon = 0.2; // seek a bit before B (YouTube seek isn't instant)
      loopTimer = setInterval(() => {
        if (!player) return;
        const A = parseFloat(document.getElementById("A").value || "0");
        const B = parseFloat(document.getElementById("B").value || "0");
        if (!(B > A)) return;

        const t = player.getCurrentTime();
        if (t >= (B - epsilon)) player.seekTo(A, true);
      }, 100);
    }

    function stopLoop() {
      if (loopTimer) clearInterval(loopTimer);
      loopTimer = null;
    }

    window.onYouTubeIframeAPIReady = () => {
	const AInput = document.getElementById("A");
const BInput = document.getElementById("B");
const nowEl = document.getElementById("now");
const durEl = document.getElementById("dur");
const sliderEl = document.getElementById("abSlider");

let abSlider = null;
let timeUiTimer = null;

function ensureMinGap(a, b) {
  if (b <= a) b = a + 0.1;
  return [a, b];
}

function setInputsFromSlider(values) {
  const a = parseFloat(values[0]);
  const b = parseFloat(values[1]);
  AInput.value = a.toFixed(2);
  BInput.value = b.toFixed(2);
}
      document.getElementById("load").onclick = () => {
        const id = parseVideoId(document.getElementById("vid").value);
        if (!id) return;

        stopLoop();
        if (player) player.destroy();

player = new YT.Player("player", {
  width: 560,
  height: 315,
  host: "https://www.youtube-nocookie.com",
  videoId: id,
  playerVars: { playsinline: 1, controls: 1, rel: 0, origin: location.origin },
  events: {
    onReady: () => {
      const vol = parseInt(document.getElementById("vol").value, 10);
      player.setVolume(vol);
      if (document.getElementById("mute").checked) player.mute();
	  const d = player.getDuration();
durEl.textContent = d.toFixed(2);

// create slider once (or recreate after load)
if (abSlider) {
  sliderEl.noUiSlider.destroy();
  abSlider = null;
}

noUiSlider.create(sliderEl, {
  start: ensureMinGap(parseFloat(AInput.value||"0"), parseFloat(BInput.value||"10")),
  connect: true,
  range: { min: 0, max: d },
  step: 0.1,
  behaviour: "tap-drag",
});

abSlider = sliderEl.noUiSlider;

let editingA = false;
let editingB = false;

function applyInputsToSlider() {
  if (!abSlider) return;
  let a = parseFloat(AInput.value || "0");
  let b = parseFloat(BInput.value || "0");
  if (isNaN(a)) a = 0;
  if (isNaN(b)) b = a + 0.1;
  if (b <= a) b = a + 0.1;
  abSlider.set([a, b]);
}

// mark when user is typing
AInput.onfocus = () => editingA = true;
BInput.onfocus = () => editingB = true;

AInput.onblur = () => { editingA = false; applyInputsToSlider(); };
BInput.onblur = () => { editingB = false; applyInputsToSlider(); };

// Enter applies too
AInput.onkeydown = (e) => { if (e.key === "Enter") AInput.blur(); };
BInput.onkeydown = (e) => { if (e.key === "Enter") BInput.blur(); };

// slider -> inputs ONLY while dragging (doesn't fight typing)
abSlider.on("slide", (values) => {
  const a = parseFloat(values[0]);
  const b = parseFloat(values[1]);
  if (!editingA) AInput.value = a.toFixed(2);
  if (!editingB) BInput.value = b.toFixed(2);
});

document.getElementById("setA").onclick = () => {
  if (!player) return;
  AInput.value = player.getCurrentTime().toFixed(2);
  if (abSlider) abSlider.set([parseFloat(AInput.value), null]);
};

document.getElementById("setB").onclick = () => {
  if (!player) return;
  BInput.value = player.getCurrentTime().toFixed(2);
  if (abSlider) abSlider.set([null, parseFloat(BInput.value)]);
};


// current time display
if (timeUiTimer) clearInterval(timeUiTimer);
timeUiTimer = setInterval(() => {
  if (!player) return;
  nowEl.textContent = player.getCurrentTime().toFixed(2);
}, 100);
    }
  }
});
      };

      document.getElementById("play").onclick = () => {
        if (!player) return;
        const A = parseFloat(document.getElementById("A").value || "0");
        player.seekTo(A, true);
        player.playVideo();
        startLoop();
      };

      document.getElementById("pause").onclick = () => {
        if (!player) return;
        player.pauseVideo();
      };

      document.getElementById("setA").onclick = () => {
        if (!player) return;
        document.getElementById("A").value = player.getCurrentTime().toFixed(2);
      };

      document.getElementById("setB").onclick = () => {
        if (!player) return;
        document.getElementById("B").value = player.getCurrentTime().toFixed(2);
      };

      document.getElementById("vol").oninput = (e) => {
        if (!player) return;
        player.setVolume(parseInt(e.target.value, 10));
      };

      document.getElementById("mute").onchange = (e) => {
        if (!player) return;
        if (e.target.checked) player.mute();
        else player.unMute();
      };

      // Optional: stop loop checks when leaving page
      window.addEventListener("beforeunload", stopLoop);
	document.getElementById("speed").onchange = (e) => {
  if (!player) return;
  player.setPlaybackRate(parseFloat(e.target.value));
};
	  
    };

  </script>
</body>
</html>
